<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#0a192f,#112240);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px 20px;
  text-align:center;
}

h1{
  font-size:32px;
  margin-bottom:30px;
  color:#ffd700;
  letter-spacing:1px;
  animation:fadeDown 1s ease;
}

.card{
  background:rgba(255,215,0,0.05);
  border:1px solid rgba(255,215,0,0.2);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:25px;
  margin:20px 0;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  transition:0.4s ease;
  animation:fadeUp 1s ease;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 40px rgba(255,215,0,0.3);
}

.zikr{
  margin:20px 0;
  padding:15px;
  border-radius:18px;
  background:rgba(10,25,47,0.8);
  transition:0.3s;
}

.zikr:hover{
  background:rgba(17,34,64,0.9);
}

.zikr p{
  font-size:20px;
  margin-bottom:10px;
  color:#ffd700;
}

.counter{
  font-size:26px;
  margin-bottom:10px;
  font-weight:bold;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
  background:linear-gradient(45deg,#ffd700,#ffb700);
  color:#0a192f;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.07);
  box-shadow:0 0 15px #ffd700;
}

.celebration{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:60px;
  display:none;
  color:#ffd700;
  animation:pop 0.8s ease forwards;
}

@keyframes pop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-40px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="container">

<h1>أذكار</h1>

<div class="card">

<div class="zikr">
<p>استغفر الله</p>
<div id="z1" class="counter">0</div>
<button onclick="increment('z1')">عد</button>
</div>

<div class="zikr">
<p>الحمد لله</p>
<div id="z2" class="counter">0</div>
<button onclick="increment('z2')">عد</button>
</div>

<div class="zikr">
<p>لا إله إلا الله</p>
<div id="z3" class="counter">0</div>
<button onclick="increment('z3')">عد</button>
</div>

<div class="zikr">
<p>الله أكبر</p>
<div id="z4" class="counter">0</div>
<button onclick="increment('z4')">عد</button>
</div>

<div class="zikr">
<p>سبحان الله وبحمده</p>
<div id="z5" class="counter">0</div>
<button onclick="increment('z5')">عد</button>
</div>

<div class="zikr">
<p>اللهم صل وسلم على نبينا محمد</p>
<div id="z6" class="counter">0</div>
<button onclick="increment('z6')">عد</button>
</div>

</div>
</div>

<div id="celebration" class="celebration">🎉✨🎉✨</div>

<script>
function increment(id){
  let count = Number(localStorage.getItem(id)) || 0;
  count++;
  localStorage.setItem(id,count);
  document.getElementById(id).innerText=count;

  if(count % 100 === 0){
    showCelebration();
  }
}

function showCelebration(){
  const c=document.getElementById("celebration");
  c.style.display="block";
  setTimeout(()=>{c.style.display="none"},2000);
}

document.querySelectorAll(".counter").forEach(el=>{
  let id=el.id;
  let saved=Number(localStorage.getItem(id))||0;
  el.innerText=saved;
});
</script>

</body>
</html>
