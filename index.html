<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#0a192f,#112240);
  color:#fff;
  min-height:100vh;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px 20px;
  text-align:center;
}

h1{
  font-size:32px;
  margin-bottom:25px;
  color:#ffd700;
}

.card{
  background:rgba(255,215,0,0.05);
  border:1px solid rgba(255,215,0,0.2);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:25px;
  margin:25px 0;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  transition:0.4s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 40px rgba(255,215,0,0.3);
}

.misbah-counter{
  font-size:60px;
  margin:20px 0;
  font-weight:bold;
  color:#ffd700;
}

.zikr{
  margin:20px 0;
  padding:15px;
  border-radius:18px;
  background:rgba(10,25,47,0.85);
  transition:0.3s;
}

.zikr:hover{
  background:rgba(17,34,64,0.95);
}

.zikr p{
  font-size:20px;
  margin-bottom:10px;
  color:#ffd700;
}

.counter{
  font-size:26px;
  margin-bottom:10px;
  font-weight:bold;
}

button{
  padding:10px 22px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
  background:linear-gradient(45deg,#ffd700,#ffb700);
  color:#0a192f;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px #ffd700;
}

.reset-btn{
  background:linear-gradient(45deg,#cbd5e1,#94a3b8);
  margin-right:8px;
}

.celebration{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:65px;
  display:none;
  color:#ffd700;
  animation:pop 0.8s ease forwards;
}

@keyframes pop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
</style>
</head>

<body>

<div class="container">

<h1>أذكاري</h1>

<!-- المسبحة -->
<div class="card">
  <h2 style="color:#ffd700;">المسبحة</h2>
  <div id="misbah" class="misbah-counter">0</div>
  <button onclick="incrementMisbah()">تسبيح</button>
  <button class="reset-btn" onclick="resetMisbah()">إعادة</button>
</div>

<!-- الأذكار -->
<div class="card">

<div class="zikr">
<p>استغفر الله</p>
<div id="z1" class="counter">0</div>
<button onclick="increment('z1')">عد</button>
</div>

<div class="zikr">
<p>الحمد لله</p>
<div id="z2" class="counter">0</div>
<button onclick="increment('z2')">عد</button>
</div>

<div class="zikr">
<p>لا إله إلا الله</p>
<div id="z3" class="counter">0</div>
<button onclick="increment('z3')">عد</button>
</div>

<div class="zikr">
<p>الله أكبر</p>
<div id="z4" class="counter">0</div>
<button onclick="increment('z4')">عد</button>
</div>

<div class="zikr">
<p>سبحان الله وبحمده</p>
<div id="z5" class="counter">0</div>
<button onclick="increment('z5')">عد</button>
</div>

<div class="zikr">
<p>اللهم صل وسلم على نبينا محمد</p>
<div id="z6" class="counter">0</div>
<button onclick="increment('z6')">عد</button>
</div>

</div>
</div>

<div id="celebration" class="celebration">🎉✨🎉✨</div>

<script>
// المسبحة
let misbahCount = Number(localStorage.getItem("misbah")) || 0;
document.getElementById("misbah").innerText = misbahCount;

function incrementMisbah(){
  misbahCount++;
  localStorage.setItem("misbah",misbahCount);
  document.getElementById("misbah").innerText = misbahCount;
  if(misbahCount % 100 === 0) showCelebration();
}

function resetMisbah(){
  misbahCount = 0;
  localStorage.setItem("misbah",0);
  document.getElementById("misbah").innerText = 0;
}

// الأذكار
function increment(id){
  let count = Number(localStorage.getItem(id)) || 0;
  count++;
  localStorage.setItem(id,count);
  document.getElementById(id).innerText = count;
  if(count % 100 === 0) showCelebration();
}

// الاحتفال
function showCelebration(){
  const c = document.getElementById("celebration");
  c.style.display="block";
  setTimeout(()=>{c.style.display="none"},2000);
}

// تحميل القيم المحفوظة
document.querySelectorAll(".counter").forEach(el=>{
  let id = el.id;
  let saved = Number(localStorage.getItem(id)) || 0;
  el.innerText = saved;
});
</script>

</body>
</html>
